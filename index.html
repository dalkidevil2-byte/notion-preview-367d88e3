</head><body><!DOCTYPE html>
<html lang="ko">
<head>
  
  
  
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      padding: 24px;
      color: #1a202c;
    }
    .container { max-width: 820px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 28px; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 14px; }
    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 44px 24px;
      text-align: center;
      background: #fff;
      cursor: pointer;
      transition: all .2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .drop-zone .icon { font-size: 44px; margin-bottom: 10px; }
    .drop-zone p { color: #475569; margin-bottom: 4px; }
    .drop-zone small { color: #94a3b8; }
    #fileInput { display: none; }
    .file-list {
      margin-top: 22px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .file-list:empty { display: none; }
    .file-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      cursor: grab;
      transition: background .15s;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: #f8fafc; }
    .file-item.dragging { opacity: .4; }
    .file-item.drag-over { border-top: 2px solid #3b82f6; }
    .drag-handle { color: #94a3b8; margin-right: 10px; font-size: 18px; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-weight: 500;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .order-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      margin-right: 10px;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
    .remove-btn:hover { background: #fef2f2; }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;

      font-weight: 600;

    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn-secondary {
      background: #fff;

<body>
  <div class="container">
    <header>
      <h1>📄 PDF 취합 도구</h1>
      <p class="subtitle">여러 PDF를 순서대로 합치고, 파일별 북마크를 자동으로 추가합니다.</p>
    </header>

    <div class="drop-zone" id="dropZone">
      <div class="icon">📥</div>
      <p><strong>PDF 파일을 끌어다 놓으세요</strong></p>
      <small>또는 클릭해서 파일 선택 (여러 개 가능)</small>
      <input type="file" id="fileInput" accept="application/pdf" multiple>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="actions">
      <button class="btn btn-secondary" id="clearBtn">전체 삭제</button>
      <button class="btn btn-primary" id="mergeBtn" disabled>PDF 합치기 &amp; 다운로드</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const { PDFDocument, PDFName, PDFString } = PDFLib;

    let files = [];
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const mergeBtn = document.getElementById('mergeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => addFiles(e.target.files));

    ['dragenter', 'dragover'].forEach(evt => {
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
    });
    ['dragleave', 'drop'].forEach(evt => {
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
      });
    });
    dropZone.addEventListener('drop', (e) => addFiles(e.dataTransfer.files));

    async function addFiles(list) {
      const pdfs = Array.from(list).filter(f => f.type === 'application/pdf' || /\.pdf$/i.test(f.name));
      if (pdfs.length === 0) {
        showStatus('PDF 파일만 추가할 수 있어요.', 'error');
        return;
      }
      for (const file of pdfs) {
        try {
          const buf = await file.arrayBuffer();
          const doc = await PDFDocument.load(buf, { ignoreEncryption: true });
          files.push({
            id: (crypto.randomUUID ? crypto.randomUUID() : String(Math.random())),
            name: file.name,
            size: file.size,
            pageCount: doc.getPageCount(),
            buffer: buf,
          });
        } catch (err) {
          showStatus(file.name + ' 읽기 실패: ' + err.message, 'error');
        }
      }
      render();
      fileInput.value = '';
    }

    function render() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.draggable = true;
        item.dataset.id = f.id;

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⋮⋮';

        const order = document.createElement('span');
        order.className = 'order-num';
        order.textContent = String(i + 1);

        const info = document.createElement('div');
        info.className = 'file-info';
        const nameEl = document.createElement('div');
        nameEl.className = 'file-name';
        nameEl.textContent = f.name;
        const metaEl = document.createElement('div');
        metaEl.className = 'file-meta';
        metaEl.textContent = formatSize(f.size) + ' · ' + f.pageCount + ' 페이지';
        info.appendChild(nameEl);
        info.appendChild(metaEl);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '삭제';
        removeBtn.addEventListener('click', () => {
          files = files.filter(x => x.id !== f.id);
          render();
        });

        item.appendChild(handle);
        item.appendChild(order);
        item.appendChild(info);
        item.appendChild(removeBtn);

        attachDnD(item);
        fileList.appendChild(item);
      });
      mergeBtn.disabled = files.length < 1;
    }

    let dragSrcId = null;
    function attachDnD(item) {
      item.addEventListener('dragstart', (e) => {
        dragSrcId = item.dataset.id;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
      });
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        const targetId = item.dataset.id;
        if (!dragSrcId || dragSrcId === targetId) return;
        const fromIdx = files.findIndex(x => x.id === dragSrcId);
        const toIdx = files.findIndex(x => x.id === targetId);
        if (fromIdx < 0 || toIdx < 0) return;
        const [moved] = files.splice(fromIdx, 1);
        files.splice(toIdx, 0, moved);
        render();
      });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function showStatus(msg, type) {
      type = type || 'info';
      status.textContent = msg;
      status.className = 'status show ' + type;
      if (type !== 'info') {
        setTimeout(() => status.classList.remove('show'), 4500);
      }
    }

    clearBtn.addEventListener('click', () => {
      files = [];
      render();
      status.classList.remove('show');
    });

    mergeBtn.addEventListener('click', async () => {
      if (files.length === 0) return;
      mergeBtn.disabled = true;
      showStatus('합치는 중...', 'info');
      try {
        const merged = await PDFDocument.create();
        const pageRefs = [];
        for (const f of files) {
          const src = await PDFDocument.load(f.buffer, { ignoreEncryption: true });
          const indices = src.getPageIndices();
          const copied = await merged.copyPages(src, indices);
          const startIndex = merged.getPageCount();
          copied.forEach(p => merged.addPage(p));
          pageRefs.push({
            title: f.name.replace(/\.pdf$/i, ''),
            pageIndex: startIndex,
          });
        }
        addBookmarks(merged, pageRefs);
        const bytes = await merged.save();
        const blob = new Blob([bytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.href = url;
        a.download = 'merged-' + ts + '.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showStatus('완료! ' + files.length + '개 파일, 총 ' + merged.getPageCount() + ' 페이지가 합쳐졌어요.', 'success');
      } catch (err) {
        console.error(err);
        showStatus('합치기 실패: ' + err.message, 'error');
      } finally {
        mergeBtn.disabled = false;
      }
    });

    function addBookmarks(pdfDoc, items) {
      if (!items || items.length === 0) return;
      const context = pdfDoc.context;
      const pages = pdfDoc.getPages();
      const outlinesRef = context.nextRef();
      const itemRefs = items.map(() => context.nextRef());
      items.forEach((item, i) => {
        const page = pages[item.pageIndex];
        const dict = {
          Title: PDFString.of(item.title),
          Parent: outlinesRef,
          Dest: [page.ref, PDFName.of('Fit')],
        };
        if (i > 0) dict.Prev = itemRefs[i - 1];
        if (i < items.length - 1) dict.Next = itemRefs[i + 1];
        context.assign(itemRefs[i], context.obj(dict));
      });
      context.assign(outlinesRef, context.obj({
        Type: PDFName.of('Outlines'),
        First: itemRefs[0],
        Last: itemRefs[itemRefs.length - 1],
        Count: items.length,
      }));
      pdfDoc.catalog.set(PDFName.of('Outlines'), outlinesRef);
      pdfDoc.catalog.set(PDFName.of('PageMode'), PDFName.of('UseOutlines'));
    }
  </script>
